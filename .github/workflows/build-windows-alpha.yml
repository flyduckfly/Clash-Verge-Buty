name: Alpha Build Windows

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  build-windows-alpha:
    if: github.ref_name == 'alpha'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust Target
        run: rustup target add ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.9
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check target
        run: pnpm check ${{ matrix.target }}

      - name: Tauri build
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Portable Bundle
        shell: pwsh
        run: pnpm portable ${{ matrix.target }}

      - name: Upload Windows alpha artifact
        uses: actions/upload-artifact@v4
        with:
          name: Clash-Verge-Buty-windows-alpha-portable
          if-no-files-found: error
          path: Clash_Verge_Buty_*_x64_portable.zip
