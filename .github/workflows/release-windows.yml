name: Release Build Windows

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g. v1.5.6)"
        required: true
        type: string
      signing_mode:
        description: "Windows signing mode"
        required: false
        default: "unsigned"
        type: choice
        options:
          - unsigned
          - pfx
          - signpath
          - ossign

permissions: write-all

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  WINDOWS_SIGNING_MODE: ${{ github.event.inputs.signing_mode || vars.WINDOWS_SIGNING_MODE || 'unsigned' }}

jobs:
  skip-non-main:
    if: github.ref_name != 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Skip reason
        run: |
          echo "Release build is restricted to main branch. Current ref is ${{ github.ref_name }}. Skipping build."

  release-windows:
    if: github.ref_name == 'main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Resolve release version from tag
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.release_tag }}".Trim()
          if (-not $tag) { throw "release_tag input is required" }
          if (-not $tag.StartsWith("v")) { throw "release_tag must start with v, got: $tag" }
          if ($tag.StartsWith("v")) {
            $version = $tag.Substring(1)
          } else {
            $version = $tag
          }
          if (-not $version) { throw "resolved VERSION is empty from tag: $tag" }
          "TAG_NAME=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust Target
        run: rustup target add ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          run_install: false

      - name: Build Windows service binaries from source
        shell: pwsh
        run: |
          cargo build --manifest-path src-tauri/windows-service-src/Cargo.toml --release --target ${{ matrix.target }}
          New-Item -ItemType Directory -Force -Path src-tauri/local-binaries/windows-service-bin | Out-Null
          $svcOut = "src-tauri/windows-service-src/target/${{ matrix.target }}/release"
          $need = @("clash-verge-service.exe", "install-service.exe", "uninstall-service.exe")
          foreach ($n in $need) {
            $src = Join-Path $svcOut $n
            if (-not (Test-Path $src)) { throw "missing service binary: $src" }
            Copy-Item $src (Join-Path "src-tauri/local-binaries/windows-service-bin" $n) -Force
          }

      - name: Pnpm install and check
        run: |
          pnpm i
          pnpm check ${{ matrix.target }}

      - name: Detect signing availability
        id: sign_mode
        shell: pwsh
        run: |
          $mode = "${{ env.WINDOWS_SIGNING_MODE }}".ToLowerInvariant()
          if (-not $mode) { $mode = "unsigned" }
          $cert = "${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}"
          $pass = "${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}"
          "mode=$mode" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          if ($mode -eq "pfx") {
            if (-not $cert -or -not $pass) {
              throw "WINDOWS_SIGNING_MODE=pfx but certificate/password secrets are missing"
            }
            "can_sign=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } elseif ($mode -eq "signpath") {
            if (-not "${{ secrets.SIGNPATH_ORGANIZATION_ID }}" -or -not "${{ secrets.SIGNPATH_PROJECT_SLUG }}" -or -not "${{ secrets.SIGNPATH_API_TOKEN }}") {
              throw "WINDOWS_SIGNING_MODE=signpath but SignPath secrets are missing"
            }
            "can_sign=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } elseif ($mode -eq "ossign") {
            if (-not "${{ secrets.OSSIGN_CLIENT_ID }}" -or -not "${{ secrets.OSSIGN_CLIENT_SECRET }}") {
              throw "WINDOWS_SIGNING_MODE=ossign but OSSign secrets are missing"
            }
            "can_sign=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            "can_sign=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "[WARN] signing disabled; release artifacts will be unsigned"
          }
          "### Windows signing mode" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- mode: $mode" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

      - name: Tauri build
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Restore certificate
        if: steps.sign_mode.outputs.mode == 'pfx' && steps.sign_mode.outputs.can_sign == 'true'
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes("windows-signing.pfx", [Convert]::FromBase64String("${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}"))

      - name: Sign final release artifacts (PFX)
        if: steps.sign_mode.outputs.mode == 'pfx' && steps.sign_mode.outputs.can_sign == 'true'
        shell: pwsh
        run: |
          $signtool = (Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          if (-not $signtool) { throw "signtool.exe not found" }
          $files = @(
            "src-tauri/target/${{ matrix.target }}/release/Clash_Verge_Buty.exe",
            "src-tauri/target/${{ matrix.target }}/release/clash-meta.exe",
            "src-tauri/target/${{ matrix.target }}/release/clash-meta-alpha.exe"
          )
          $files += Get-ChildItem "src-tauri/target/${{ matrix.target }}/release/bundle" -Recurse -File -Include *.exe,*.msi | ForEach-Object { $_.FullName }
          $files = $files | Where-Object { Test-Path $_ } | Select-Object -Unique
          foreach ($f in $files) {
            & $signtool sign /fd SHA256 /td SHA256 /tr "http://timestamp.digicert.com" /f "windows-signing.pfx" /p "${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}" "$f"
          }

      - name: Sign final release artifacts (SignPath)
        if: steps.sign_mode.outputs.mode == 'signpath' && steps.sign_mode.outputs.can_sign == 'true'
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ secrets.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          input-artifact-path: src-tauri/target/${{ matrix.target }}/release/Clash_Verge_Buty.exe
          output-artifact-directory: src-tauri/target/${{ matrix.target }}/release

      - name: OSSign signing placeholder
        if: steps.sign_mode.outputs.mode == 'ossign' && steps.sign_mode.outputs.can_sign == 'true'
        shell: pwsh
        run: |
          throw "OSSign mode selected. Please wire your OSSign action/CLI command in this step per docs/windows-signing.md."

      - name: Verify final signatures
        if: steps.sign_mode.outputs.mode != 'unsigned' && steps.sign_mode.outputs.can_sign == 'true'
        shell: pwsh
        run: |
          $signtool = (Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          $files = @(
            "src-tauri/target/${{ matrix.target }}/release/Clash_Verge_Buty.exe",
            "src-tauri/target/${{ matrix.target }}/release/clash-meta.exe",
            "src-tauri/target/${{ matrix.target }}/release/clash-meta-alpha.exe"
          )
          $files += Get-ChildItem "src-tauri/target/${{ matrix.target }}/release/bundle" -Recurse -File -Include *.exe,*.msi | ForEach-Object { $_.FullName }
          $files = $files | Where-Object { Test-Path $_ } | Select-Object -Unique
          foreach ($f in $files) {
            & $signtool verify /pa /v "$f"
            Get-AuthenticodeSignature "$f" | Format-List Status,StatusMessage,SignerCertificate,TimeStamperCertificate
          }

      - name: Portable Bundle
        shell: pwsh
        run: |
          pnpm portable ${{ matrix.target }}
        env:
          SKIP_RELEASE_UPLOAD: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UNSIGNED_BUILD: ${{ steps.sign_mode.outputs.can_sign == 'true' && '0' || '1' }}

      - name: Stage and validate release assets
        shell: pwsh
        run: |
          $stage = "dist/windows-release-staging"
          if (Test-Path $stage) { Remove-Item $stage -Recurse -Force }
          New-Item -ItemType Directory -Path $stage | Out-Null

          $expectedInstaller = "Clash-Verge-Buty_${env:VERSION}_x64-setup_unsigned.exe"
          $expectedPortable = "Clash-Verge-Buty_${env:VERSION}_x64_portable_unsigned.zip"
          $expectedSource = "Clash_Verge_Buty-v${env:VERSION}-full-source.zip"

          $nsisRoot = "src-tauri/target/${{ matrix.target }}/release/bundle/nsis"
          if (-not (Test-Path $nsisRoot)) { throw "nsis bundle folder not found: $nsisRoot" }

          $installerCandidates = Get-ChildItem $nsisRoot -Recurse -File -Filter "Clash-Verge-Buty_*_x64-setup*.exe"
          if (-not $installerCandidates) { throw "no installer candidate found in $nsisRoot" }

          $unsignedCandidate = $installerCandidates | Where-Object { $_.Name -eq $expectedInstaller } | Select-Object -First 1
          if (-not $unsignedCandidate) {
            $plainInstaller = $installerCandidates | Where-Object { $_.Name -eq "Clash-Verge-Buty_${env:VERSION}_x64-setup.exe" } | Select-Object -First 1
            if (-not $plainInstaller) {
              throw "cannot find expected installer names. found: $($installerCandidates.Name -join ', ')"
            }
            Rename-Item -Path $plainInstaller.FullName -NewName $expectedInstaller
            $unsignedCandidate = Get-Item (Join-Path $plainInstaller.DirectoryName $expectedInstaller)
          }
          Copy-Item $unsignedCandidate.FullName (Join-Path $stage $expectedInstaller) -Force

          $portableCandidates = Get-ChildItem . -Recurse -File -Filter "*.zip" | Where-Object { $_.Name -eq $expectedPortable }
          if ($portableCandidates.Count -ne 1) {
            $found = if ($portableCandidates) { $portableCandidates | ForEach-Object { $_.FullName } } else { @("<none>") }
            throw "portable zip must exist exactly once with name: $expectedPortable. found: $($found -join ', ')"
          }
          $portable = $portableCandidates | Select-Object -First 1
          Copy-Item $portable.FullName (Join-Path $stage $expectedPortable) -Force

          $sourcePath = Join-Path $stage $expectedSource
          git archive --format=zip --output="$sourcePath" HEAD
          if (-not (Test-Path $sourcePath)) {
            throw "source archive was not created: $sourcePath"
          }

          $actual = Get-ChildItem $stage -File | Sort-Object Name
          Write-Host "[INFO] staging files:"
          $actual | ForEach-Object { Write-Host " - $($_.Name)" }

          $expected = @($expectedInstaller, $expectedPortable, $expectedSource) | Sort-Object
          if ($actual.Count -ne 3) {
            throw "staging file count must be 3, got $($actual.Count)"
          }
          $actualNames = $actual.Name
          $diff = Compare-Object -ReferenceObject $expected -DifferenceObject $actualNames
          if ($diff) {
            throw "staging filenames mismatch. expected: $($expected -join ', '), actual: $($actualNames -join ', ')"
          }

      - name: Cleanup non-whitelist release assets
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $allowed = @(
            "Clash-Verge-Buty_${env:VERSION}_x64-setup_unsigned.exe",
            "Clash-Verge-Buty_${env:VERSION}_x64_portable_unsigned.zip",
            "Clash_Verge_Buty-v${env:VERSION}-full-source.zip"
          )
          $releaseExists = $true
          gh release view "${env:TAG_NAME}" --json id *> $null
          if ($LASTEXITCODE -ne 0) {
            $releaseExists = $false
            Write-Host "[INFO] release ${env:TAG_NAME} does not exist yet; skip cleanup"
          }

          if ($releaseExists) {
            $assets = gh release view "${env:TAG_NAME}" --json assets --jq '.assets[].name'
            foreach ($name in $assets) {
              if ($allowed -notcontains $name) {
                gh release delete-asset "${env:TAG_NAME}" "$name" --yes
              }
            }
          }

      - name: Upload Windows distribution assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            dist/windows-release-staging/Clash-Verge-Buty_${{ env.VERSION }}_x64-setup_unsigned.exe
            dist/windows-release-staging/Clash-Verge-Buty_${{ env.VERSION }}_x64_portable_unsigned.zip
            dist/windows-release-staging/Clash_Verge_Buty-v${{ env.VERSION }}-full-source.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Unsigned build notice
        if: steps.sign_mode.outputs.can_sign != 'true'
        shell: pwsh
        run: |
          "### Windows signing status" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "This Windows build is unsigned." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "Windows may show Unknown Publisher / SmartScreen warning." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "This is expected for unsigned builds." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

      - name: Cleanup cert file
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "windows-signing.pfx") { Remove-Item "windows-signing.pfx" -Force }
