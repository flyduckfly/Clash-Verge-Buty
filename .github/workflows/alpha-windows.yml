name: Alpha Build Windows

on:
  workflow_dispatch:
    inputs:
      signing_mode:
        description: "Windows signing mode"
        required: false
        default: "unsigned"
        type: choice
        options:
          - unsigned
          - pfx
          - signpath
          - ossign

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  WINDOWS_SIGNING_MODE: ${{ github.event.inputs.signing_mode || vars.WINDOWS_SIGNING_MODE || 'unsigned' }}

jobs:
  alpha-windows:
    if: github.ref_name == 'alpha'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust Target
        run: rustup target add ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.9
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows service binaries from source
        shell: pwsh
        run: |
          cargo build --manifest-path src-tauri/windows-service-src/Cargo.toml --release --target ${{ matrix.target }}
          New-Item -ItemType Directory -Force -Path src-tauri/local-binaries/windows-service-bin | Out-Null
          $svcOut = "src-tauri/windows-service-src/target/${{ matrix.target }}/release"
          $need = @("clash-verge-service.exe", "install-service.exe", "uninstall-service.exe")
          foreach ($n in $need) {
            $src = Join-Path $svcOut $n
            if (-not (Test-Path $src)) { throw "missing service binary: $src" }
            Copy-Item $src (Join-Path "src-tauri/local-binaries/windows-service-bin" $n) -Force
          }

      - name: Check target
        run: pnpm check ${{ matrix.target }}

      - name: Tauri build
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Detect signing availability
        id: sign_mode
        shell: pwsh
        run: |
          $mode = "${{ env.WINDOWS_SIGNING_MODE }}".ToLowerInvariant()
          if (-not $mode) { $mode = "unsigned" }
          $cert = "${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}"
          $pass = "${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}"
          "mode=$mode" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          if ($mode -eq "pfx") {
            if (-not $cert -or -not $pass) {
              throw "WINDOWS_SIGNING_MODE=pfx but certificate/password secrets are missing"
            }
            "can_sign=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } elseif ($mode -eq "signpath") {
            if (-not "${{ secrets.SIGNPATH_ORGANIZATION_ID }}" -or -not "${{ secrets.SIGNPATH_PROJECT_SLUG }}" -or -not "${{ secrets.SIGNPATH_API_TOKEN }}") {
              throw "WINDOWS_SIGNING_MODE=signpath but SignPath secrets are missing"
            }
            "can_sign=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } elseif ($mode -eq "ossign") {
            if (-not "${{ secrets.OSSIGN_CLIENT_ID }}" -or -not "${{ secrets.OSSIGN_CLIENT_SECRET }}") {
              throw "WINDOWS_SIGNING_MODE=ossign but OSSign secrets are missing"
            }
            "can_sign=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            "can_sign=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "[WARN] signing disabled, producing unsigned artifacts"
          }
          "### Windows signing mode" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- mode: $mode" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

      - name: Restore certificate
        if: steps.sign_mode.outputs.mode == 'pfx' && steps.sign_mode.outputs.can_sign == 'true'
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes("windows-signing.pfx", [Convert]::FromBase64String("${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}"))

      - name: Sign Windows artifacts (PFX)
        if: steps.sign_mode.outputs.mode == 'pfx' && steps.sign_mode.outputs.can_sign == 'true'
        shell: pwsh
        run: |
          $signtool = (Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          if (-not $signtool) { throw "signtool.exe not found" }
          $files = @(
            "src-tauri/target/${{ matrix.target }}/release/Clash_Verge_Buty.exe",
            "src-tauri/target/${{ matrix.target }}/release/clash-meta.exe",
            "src-tauri/target/${{ matrix.target }}/release/clash-meta-alpha.exe"
          )
          $files += Get-ChildItem "src-tauri/target/${{ matrix.target }}/release/bundle" -Recurse -File -Include *.exe,*.msi | ForEach-Object { $_.FullName }
          $files = $files | Where-Object { Test-Path $_ } | Select-Object -Unique
          foreach ($f in $files) {
            & $signtool sign /fd SHA256 /td SHA256 /tr "http://timestamp.digicert.com" /f "windows-signing.pfx" /p "${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}" "$f"
          }

      - name: Sign Windows artifacts (SignPath)
        if: steps.sign_mode.outputs.mode == 'signpath' && steps.sign_mode.outputs.can_sign == 'true'
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ secrets.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          input-artifact-path: src-tauri/target/${{ matrix.target }}/release/Clash_Verge_Buty.exe
          output-artifact-directory: src-tauri/target/${{ matrix.target }}/release

      - name: OSSign signing placeholder
        if: steps.sign_mode.outputs.mode == 'ossign' && steps.sign_mode.outputs.can_sign == 'true'
        shell: pwsh
        run: |
          throw "OSSign mode selected. Please wire your OSSign action/CLI command in this step per docs/windows-signing.md."

      - name: Verify signatures
        if: steps.sign_mode.outputs.mode != 'unsigned' && steps.sign_mode.outputs.can_sign == 'true'
        shell: pwsh
        run: |
          $signtool = (Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          $files = @(
            "src-tauri/target/${{ matrix.target }}/release/Clash_Verge_Buty.exe",
            "src-tauri/target/${{ matrix.target }}/release/clash-meta.exe",
            "src-tauri/target/${{ matrix.target }}/release/clash-meta-alpha.exe"
          )
          $files += Get-ChildItem "src-tauri/target/${{ matrix.target }}/release/bundle" -Recurse -File -Include *.exe,*.msi | ForEach-Object { $_.FullName }
          $files = $files | Where-Object { Test-Path $_ } | Select-Object -Unique
          foreach ($f in $files) {
            & $signtool verify /pa /v "$f"
            Get-AuthenticodeSignature "$f" | Format-List Status,StatusMessage,SignerCertificate,TimeStamperCertificate
          }

      - name: Portable Bundle
        shell: pwsh
        run: pnpm portable ${{ matrix.target }} alpha
        env:
          SKIP_RELEASE_UPLOAD: "1"
          UNSIGNED_BUILD: ${{ steps.sign_mode.outputs.can_sign == 'true' && '0' || '1' }}

      - name: Normalize unsigned Windows bundle names
        if: steps.sign_mode.outputs.can_sign != 'true'
        shell: pwsh
        run: |
          $bundleRoot = "src-tauri/target/${{ matrix.target }}/release/bundle"
          if (Test-Path $bundleRoot) {
            $targets = Get-ChildItem $bundleRoot -Recurse -File -Include *.exe,*.msi
            foreach ($f in $targets) {
              if ($f.Name -match "_unsigned(\.[^.]+)$") { continue }
              $dest = Join-Path $f.DirectoryName ($f.BaseName + "_unsigned" + $f.Extension)
              Copy-Item $f.FullName $dest -Force
              Write-Host "[INFO] unsigned alias: $($f.Name) -> $([IO.Path]::GetFileName($dest))"
            }
          }

      - name: Debug Windows bundle outputs
        shell: pwsh
        run: |
          $releaseDir = "src-tauri/target/${{ matrix.target }}/release"
          $nsisDir = "$releaseDir/bundle/nsis"
          Write-Host "[INFO] target/release exe files"
          if (Test-Path $releaseDir) {
            Get-ChildItem $releaseDir -File -Filter *.exe | ForEach-Object { Write-Host " - $($_.Name)" }
          }
          Write-Host "[INFO] target/release/bundle/nsis exe files"
          if (Test-Path $nsisDir) {
            Get-ChildItem $nsisDir -File -Filter *.exe | ForEach-Object { Write-Host " - $($_.Name)" }
          }

      - name: Stage Windows portable artifact
        shell: pwsh
        run: |
          $stage = "dist/windows-alpha-portable"
          if (Test-Path $stage) { Remove-Item $stage -Recurse -Force }
          New-Item -ItemType Directory -Path $stage | Out-Null

          $portableZip = Get-ChildItem . -File | Where-Object { $_.Name -match "^Clash-Verge-Buty([_-].*)?[-_]portable.*\.zip$" -or $_.Name -match "^Clash[-_.]Verge[-_.]Buty_.*_x64_portable.*\.zip$" } | Select-Object -First 1
          if (-not $portableZip) {
            throw "portable artifact zip not found in workspace root"
          }

          Write-Host "[INFO] portable zip path: $($portableZip.FullName)"
          Write-Host "[INFO] portable zip entries"
          tar -tf $portableZip.FullName

          $portableConfigSources = @(
            "src-tauri/resources/config",
            "src-tauri/config",
            "dist/config",
            "src-tauri/target/${{ matrix.target }}/release/.config"
          )
          foreach ($src in $portableConfigSources) {
            if (Test-Path $src) {
              Write-Host "[INFO] config source exists: $src"
              Get-ChildItem $src -Force -Recurse | ForEach-Object { Write-Host "   - $($_.FullName)" }
            } else {
              Write-Host "[INFO] config source missing: $src"
            }
          }

          Expand-Archive -Path $portableZip.FullName -DestinationPath $stage -Force
          Write-Host "[INFO] prepared portable artifact from: $($portableZip.Name)"
          Write-Host "[INFO] staged portable content"
          Get-ChildItem $stage -Force -Recurse | ForEach-Object { Write-Host " - $($_.FullName)" }

          if (-not (Get-ChildItem $stage -Force -Recurse -File)) {
            throw "portable artifact content not found after unzip: $($portableZip.FullName)"
          }
          $portableMarker = Join-Path $stage ".config/PORTABLE"
          if (-not (Test-Path $portableMarker)) {
            throw "Portable marker missing: $portableMarker"
          }
          Write-Host "[INFO] portable marker found: $portableMarker"

      - name: Stage Windows installer artifact
        shell: pwsh
        run: |
          $stage = "dist/windows-alpha-installer"
          if (Test-Path $stage) { Remove-Item $stage -Recurse -Force }
          New-Item -ItemType Directory -Path $stage | Out-Null

          $nsisRoot = "src-tauri/target/${{ matrix.target }}/release/bundle/nsis"
          if (-not (Test-Path $nsisRoot)) {
            throw "nsis bundle folder not found: $nsisRoot"
          }
          if ("${{ steps.sign_mode.outputs.can_sign }}" -eq "true") {
            $installers = Get-ChildItem $nsisRoot -Recurse -File -Include *.exe | Where-Object { $_.Name -notmatch "_unsigned(\.[^.]+)$" }
          } else {
            $installers = Get-ChildItem $nsisRoot -Recurse -File -Include *_unsigned.exe
          }
          foreach ($f in $installers) {
            Copy-Item $f.FullName (Join-Path $stage $f.Name) -Force
          }
          if (-not (Get-ChildItem $stage -File)) {
            throw "installer artifact files not found in $stage"
          }

          "### Final Windows artifacts" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- portable artifact: dist/windows-alpha-portable/** (unzipped portable content)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          Get-ChildItem "dist/windows-alpha-portable" -Recurse -File | ForEach-Object { "  - $($_.FullName)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append }
          "- installer artifact: dist/windows-alpha-installer/*" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          Get-ChildItem "dist/windows-alpha-installer" -File | ForEach-Object { "  - $($_.Name)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append }

      - name: Cleanup cert file
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "windows-signing.pfx") { Remove-Item "windows-signing.pfx" -Force }

      - name: Unsigned build notice
        if: steps.sign_mode.outputs.can_sign != 'true'
        shell: pwsh
        run: |
          "### Windows signing status" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "This Windows build is unsigned." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "Windows may show Unknown Publisher / SmartScreen warning." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "This is expected for unsigned builds." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

      - name: Upload Windows alpha artifact
        uses: actions/upload-artifact@v4
        with:
          name: Clash-Verge-Buty-windows-alpha-portable
          if-no-files-found: error
          include-hidden-files: true
          path: dist/windows-alpha-portable/
      - name: Upload Windows alpha installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Clash-Verge-Buty-windows-alpha-installer
          if-no-files-found: error
          path: dist/windows-alpha-installer/*
